<div *ngIf="items.length; else emptyState" class="flex items-center gap-4">
  <div class="relative h-32 w-32 rounded-full" [style.background]="conicStyle">
    <div class="absolute inset-4 rounded-full bg-white"></div>
  </div>
  <div class="flex-1 space-y-2">
    <div *ngFor="let item of items; let i = index" class="flex items-center justify-between text-sm text-slate-700">
      <div class="flex items-center gap-2">
        <span class="inline-block h-2.5 w-2.5 rounded-full" [style.background]="swatch(item, i)"></span>
        <span>{{ item.label }}</span>
      </div>
      <span class="font-medium">{{ item.value }}</span>
    </div>
  </div>
</div>
<ng-template #emptyState>
  <div class="rounded-lg border border-dashed border-slate-300 px-3 py-6 text-center text-sm text-slate-500">Sin distribución disponible.</div>
</ng-template>
