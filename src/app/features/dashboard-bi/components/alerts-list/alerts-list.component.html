<div *ngIf="items.length; else emptyState" class="space-y-2">
  <div *ngFor="let a of items" class="rounded-xl border border-slate-200 bg-white p-3">
    <div class="flex items-center justify-between gap-2">
      <div class="text-sm font-medium text-slate-800">{{ a.tipo }}</div>
      <span class="rounded-full px-2 py-0.5 text-xs font-medium" [ngClass]="toneClass(a.severidad)">{{ a.severidad }}</span>
    </div>
    <div class="mt-1 text-xs text-slate-600">Total: <strong>{{ a.total }}</strong></div>
    <div *ngIf="a.detalle" class="mt-1 text-xs text-slate-500">{{ a.detalle }}</div>
  </div>
</div>
<ng-template #emptyState>
  <div class="rounded-lg border border-dashed border-slate-300 px-3 py-6 text-center text-sm text-slate-500">Sin alertas activas.</div>
</ng-template>
