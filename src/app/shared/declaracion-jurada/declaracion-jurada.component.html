<div #printRoot class="mx-auto w-full max-w-md px-2 py-3 print:p-0">
  <div class="no-print mb-3 flex justify-center">
    <button
      type="button"
      (click)="print()"
      class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50">
      Imprimir declaración
    </button>
  </div>

  <section class="thermal-80 mx-auto border border-slate-200 bg-white p-3 text-[11px] leading-tight text-slate-900 shadow-sm print:border-0 print:shadow-none">
    <header class="border-b border-dashed border-slate-300 pb-2 text-center">
      <img *ngIf="companyLogoSrc() as logo" [src]="logo" alt="Logo empresa" class="mx-auto mb-1 max-h-16 object-contain" />
      <div class="font-semibold tracking-wide">DECLARACION JURADA – ENCOMIENDAS</div>
    </header>

    <div class="space-y-2 py-2">
      <p class="whitespace-pre-wrap text-justify">
        {{ encabezadoLinea }}
      </p>
      <p *ngFor="let linea of lineas" class="whitespace-pre-wrap text-justify">
        {{ linea }}
      </p>
    </div>
  </section>
</div>
